<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VL Analytics | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        .logo h1 span { color: #4f8ef7; }
        .logo p { color: #555; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #555; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        input {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #4f8ef7; }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #4f8ef7, #2563eb);
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 16px; color: #ef4444; font-size: 13px; margin-bottom: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>VL <span>Analytics</span></h1>
            <p>Sistema de Analíticas</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="admin" autofocus>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>
    </div>
</body>
</html>
